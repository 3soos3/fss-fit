name: release
on:
  push:
    tags:
      - 'F0006-v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a
        with:
          go-version: "1.22"
      - name: Validate tag
        run: echo "${{ github.ref_name }}" | grep -E '^F0006-v[0-9]+\.[0-9]+\.[0-9]+$'
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb4d20f25a6b12caeef2e2
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/3soos3/fit-issuer:${{ github.ref_name }}
            ghcr.io/3soos3/fit-issuer:latest
      - name: Trivy scan
        uses: aquasecurity/trivy-action@18f2505d82f80e8b36e6e5be3b6a6697c0c7a294
        with:
          image-ref: ghcr.io/3soos3/fit-issuer:${{ github.ref_name }}
          exit-code: '1'
          severity: CRITICAL
