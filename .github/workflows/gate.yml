name: gate
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a
        with:
          go-version: "1.26"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: govulncheck ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go test ./internal/... -race -count=1
      - run: go test ./tests/integration/... -count=1 -timeout 60s
      - run: go build ./...
